server {
    listen 80;

    # 1. Serve the React Application for standard web traffic
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This allows React Router to handle page navigation without throwing 404 errors
        try_files $uri $uri/ /index.html; 
    }

    # 2. Reverse Proxy: Catch API requests and forward them to the Internal ALB
    location /api/ {
        # REPLACE THIS with your exact Internal ALB DNS Name!
        proxy_pass http://greenhouse-internal-alb-xxxxxxxxx.us-east-1.elb.amazonaws.com;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}